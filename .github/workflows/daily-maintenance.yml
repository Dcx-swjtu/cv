name: Daily maintenance

on:
  schedule:
    # 09:00 Asia/Shanghai = 01:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: daily-maintenance-${{ github.ref }}
  cancel-in-progress: false

jobs:
  maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect project tooling
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          echo "node=false" >> "$GITHUB_OUTPUT"
          echo "python=false" >> "$GITHUB_OUTPUT"
          if [ -f package.json ]; then echo "node=true" >> "$GITHUB_OUTPUT"; fi
          if find . -maxdepth 3 \( -name 'pyproject.toml' -o -name 'requirements*.txt' -o -name 'setup.py' \) | grep -q .; then
            echo "python=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: steps.detect.outputs.node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Set up Python
        if: steps.detect.outputs.python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Helper for separated commits
        shell: bash
        run: |
          cat > /tmp/commit-if-changed <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          message="$1"
          if ! git diff --quiet || ! git diff --cached --quiet; then
            git add -A
            git commit -m "$message"
          fi
          SCRIPT
          chmod +x /tmp/commit-if-changed

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f npm-shrinkwrap.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install --no-audit --no-fund
          fi
          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            python -m pip install -r requirements.txt
          fi
          if [ -f pyproject.toml ] || find . -maxdepth 3 -name '*.py' | grep -q .; then
            python -m pip install ruff pytest || true
          fi

      - name: Update dependencies within declared ranges
        shell: bash
        run: |
          set +e
          if [ -f package-lock.json ]; then
            npm update --package-lock-only --no-audit --no-fund
          fi
          if [ -f npm-shrinkwrap.json ]; then
            npm update --package-lock-only --no-audit --no-fund
          fi
          /tmp/commit-if-changed "chore: update dependencies"

      - name: Format code
        shell: bash
        run: |
          set +e
          if [ -f package.json ]; then
            npm run format --if-present
          fi
          if find . -maxdepth 5 -name '*.py' | grep -q .; then
            python -m ruff format .
          fi
          /tmp/commit-if-changed "style: format code"

      - name: Fix lint issues
        shell: bash
        run: |
          set +e
          if [ -f package.json ]; then
            npm run lint:fix --if-present
            npm run lint --if-present -- --fix
          fi
          if find . -maxdepth 5 -name '*.py' | grep -q .; then
            python -m ruff check . --fix
          fi
          /tmp/commit-if-changed "fix: apply lint fixes"

      - name: Update maintenance log
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .github
          {
            echo "## $(date -u +'%Y-%m-%d')"
            echo "- Ran scheduled dependency, format, lint, test, and TODO maintenance."
            echo
          } >> .github/maintenance-log.md
          /tmp/commit-if-changed "docs: update maintenance log"

      - name: Run tests
        shell: bash
        run: |
          set +e
          status=0
          if [ -f package.json ]; then
            npm test -- --watch=false || npm test || status=$?
          fi
          if find . -maxdepth 4 \( -path './tests' -o -path './test' \) | grep -q .; then
            python -m pytest || status=$?
          fi
          if [ "$status" -ne 0 ]; then
            echo "Tests failed after automated maintenance. Manual review may be needed." >&2
            exit "$status"
          fi

      - name: Push maintenance commits
        if: success()
        run: |
          git push

      - name: Scan TODOs and create/update issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('node:child_process');
            let output = '';
            try {
              output = execSync("grep -RInE 'TODO|FIXME|HACK' . --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=.venv --exclude-dir=dist --exclude-dir=build | head -200", { encoding: 'utf8' });
            } catch (error) {
              output = error.stdout || '';
            }
            if (!output.trim()) return;
            const title = 'Maintenance TODO scan';
            const body = `Scheduled maintenance found TODO-style markers that may need review.\n\n\`\`\`text\n${output.slice(0, 60000)}\n\`\`\``;
            const { owner, repo } = context.repo;
            const existing = await github.rest.issues.listForRepo({ owner, repo, state: 'open', per_page: 100 });
            const issue = existing.data.find(item => item.title === title && !item.pull_request);
            if (issue) {
              await github.rest.issues.update({ owner, repo, issue_number: issue.number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title, body });
            }
